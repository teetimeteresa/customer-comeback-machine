<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#0F172A"/>
  
  <!-- Subtle Grid for Tech side -->
  <path d="M0 100 H600 M0 200 H600 M0 300 H600 M0 400 H600 M0 500 H600 M100 0 V630 M200 0 V630 M300 0 V630 M400 0 V630 M500 0 V630" stroke="#334155" stroke-width="1" opacity="0.5" />
  
  <!-- Warm glow for Human side -->
  <circle cx="1000" cy="315" r="400" fill="#F59E0B" fill-opacity="0.1" />
  
  <!-- Handshake Illustration -->
  <g transform="translate(600, 315)">
    <!-- Tech Hand (Left) -->
    <path d="M-300 50 L-100 50 L-50 0 L-100 -50 L-300 -50 Z" fill="none" stroke="#38BDF8" stroke-width="4" stroke-dasharray="8 8" />
    <circle cx="-75" cy="0" r="10" fill="#38BDF8" />
    <path d="M-150 -50 L-150 50" stroke="#38BDF8" stroke-opacity="0.2" />
    
    <!-- Human Hand (Right) -->
    <path d="M300 60 L100 60 L50 0 L100 -60 L300 -60 Z" fill="#F59E0B" />
    <path d="M50 0 L100 -60 L150 -50 L100 10 Z" fill="#D97706" /> <!-- Thumb/Palm detail -->
    
    <!-- Meeting Point (The Handshake) -->
    <rect x="-60" y="-80" width="120" height="160" rx="20" fill="white" fill-opacity="0.05" stroke="white" stroke-width="2" stroke-opacity="0.2" />
    <path d="M0 -40 V40" stroke="white" stroke-width="4" stroke-linecap="round" opacity="0.5" />
  </g>
  
  <!-- Text Content -->
  <g transform="translate(100, 150)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="80" fill="white" letter-spacing="-4">
      <tspan x="0" dy="0">The Digital</tspan>
      <tspan x="0" dy="100" fill="#FBBF24">Handshake.</tspan>
    </text>
    <text x="0" y="240" font-family="'Inter', sans-serif" font-weight="500" font-size="32" fill="#94A3B8">
      Where High-Tech meets Old-School Warmth.
    </text>
  </g>
  
  <text x="600" y="580" font-family="'Inter', sans-serif" font-weight="900" font-size="20" fill="white" fill-opacity="0.3" text-anchor="middle" letter-spacing="8">EMPATHY-DRIVEN AUTOMATION</text>
</svg>
