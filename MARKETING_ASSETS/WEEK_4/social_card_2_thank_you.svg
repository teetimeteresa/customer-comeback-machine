<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#FBBF24"/>
  
  <rect x="60" y="60" width="960" height="960" rx="80" fill="white" />
  
  <g transform="translate(140, 150)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="90" fill="#1C1917" letter-spacing="-4">
      <tspan x="0" dy="0">Deliver that</tspan>
      <tspan x="0" dy="100" fill="#D97706">"Regular"</tspan>
      <tspan x="0" dy="100">Feeling.</tspan>
    </text>
    
    <g transform="translate(0, 320)">
      <text font-family="'Inter', sans-serif" font-weight="600" font-size="40" fill="#57534E" leading-relaxed="1.4">
        <tspan x="0" dy="0">Being a 'regular' starts with a</tspan>
        <tspan x="0" dy="60">warm thank you. We help you</tspan>
        <tspan x="0" dy="60">deliver that feeling to every</tspan>
        <tspan x="0" dy="60">neighbor who walks in.</tspan>
      </text>
    </g>
    
    <!-- Coffee Cup Illustration -->
    <g transform="translate(300, 600)">
      <path d="M0 0 H200 C200 0 200 150 100 150 C0 150 0 0 0 0Z" fill="#F5F5F4" stroke="#E7E5E4" stroke-width="4" />
      <path d="M200 30 H230 C250 30 250 80 230 80 H200" stroke="#E7E5E4" stroke-width="8" stroke-linecap="round" />
      <circle cx="70" cy="50" r="10" fill="#D97706" />
      <circle cx="130" cy="50" r="10" fill="#D97706" />
      <path d="M70 100 Q100 130 130 100" stroke="#D97706" stroke-width="8" stroke-linecap="round" fill="none" />
      
      <!-- Heart Steam -->
      <path d="M100 -20 C100 -20 130 -40 130 -60 C130 -75 120 -85 105 -85 C95 -85 90 -80 85 -75 C80 -80 75 -85 65 -85 C50 -85 40 -75 40 -60 C40 -40 70 -20 70 -20 L85 -10 L100 -20Z" fill="#F43F5E" opacity="0.6" transform="scale(0.8) translate(20, -50)" />
    </g>
  </g>
  
  <text x="540" y="1000" font-family="'Inter', sans-serif" font-weight="900" font-size="24" fill="#1C1917" text-anchor="middle" letter-spacing="4">PEOPLE-FIRST AUTOMATION</text>
</svg>
