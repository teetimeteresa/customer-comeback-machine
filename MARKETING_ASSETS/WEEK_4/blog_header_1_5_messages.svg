<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background: Warm Room/Counter Feel -->
  <rect width="1200" height="630" fill="#F5F5F4"/>
  
  <!-- Wooden Counter Bottom -->
  <rect y="450" width="1200" height="180" fill="#44403C" />
  <rect y="450" width="1200" height="10" fill="#292524" />
  
  <!-- Warm Lamp Glow from the side -->
  <circle cx="1000" cy="100" r="500" fill="#FBBF24" fill-opacity="0.1" />
  <circle cx="1000" cy="100" r="300" fill="#FBBF24" fill-opacity="0.1" />
  
  <!-- Content Area Background (Floating Paper) -->
  <g transform="translate(100, 80)">
    <rect width="1000" height="400" rx="4" fill="white" shadow="0 10px 30px rgba(0,0,0,0.1)" />
    <path d="M0 0 L20 0 L0 20 Z" fill="#E7E5E4" /> <!-- Dog ear -->
  </g>
  
  <!-- Text Content -->
  <g transform="translate(180, 180)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="72" fill="#1C1917" letter-spacing="-3">
      <tspan x="0" dy="0">The 5 Messages</tspan>
      <tspan x="0" dy="85">Every Shop</tspan>
      <tspan x="0" dy="85" fill="#D97706">Must Send.</tspan>
    </text>
    <text x="0" y="240" font-family="'Inter', sans-serif" font-weight="500" font-size="24" fill="#57534E">
      Stop leaving your local impact to chance.
    </text>
  </g>
  
  <!-- Illustrative Pencil (Old school) -->
  <g transform="translate(950, 400) rotate(35)">
    <rect width="10" height="150" fill="#F59E0B" />
    <rect y="150" width="10" height="20" fill="#E7E5E4" /> <!-- Wood part -->
    <path d="M0 170 L5 190 L10 170 Z" fill="#292524" /> <!-- Tip -->
    <rect y="-20" width="10" height="20" fill="#F43F5E" rx="2" /> <!-- Eraser -->
  </g>
  
  <!-- Logo Badge -->
  <g transform="translate(100, 520)">
     <path d="M0 10C0 4.47715 4.47715 0 10 0H180C185.523 0 190 4.47715 190 10V40C190 45.5228 185.523 50 180 50H10C4.47715 50 0 45.5228 0 40V10Z" fill="#F59E0B" />
     <text x="95" y="32" font-family="'Inter', sans-serif" font-weight="900" font-size="14" fill="white" text-anchor="middle" letter-spacing="2">CUSTOMER COMEBACK</text>
  </g>
</svg>
