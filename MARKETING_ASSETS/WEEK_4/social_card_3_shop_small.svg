<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#0F172A"/>
  
  <g transform="translate(140, 150)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="100" fill="white" letter-spacing="-4">
      <tspan x="0" dy="0">It's about the</tspan>
      <tspan x="0" dy="110" fill="#FBBF24">People.</tspan>
      <tspan x="0" dy="110">Not Products.</tspan>
    </text>
    
    <g transform="translate(0, 380)">
      <text font-family="'Inter', sans-serif" font-weight="500" font-size="44" fill="#94A3B8" leading-relaxed="1.4">
        <tspan x="0" dy="0">The heart of our downtowns isn't</tspan>
        <tspan x="0" dy="60">in what you sell—it's in the</tspan>
        <tspan x="0" dy="60">people you serve. Stay connected</tspan>
        <tspan x="0" dy="60">to your community.</tspan>
      </text>
    </g>
    
    <!-- Neighbors silhouettes -->
    <g transform="translate(0, 700)">
       <!-- Simplistic human shapes -->
       <g fill="#334155">
         <circle cx="50" cy="50" r="40" />
         <rect x="0" y="100" width="100" height="150" rx="40" />
         
         <circle cx="200" cy="70" r="35" fill="#475569" />
         <rect x="160" y="115" width="80" height="135" rx="35" fill="#475569" />
         
         <circle cx="350" cy="40" r="45" fill="#F59E0B" />
         <rect x="290" y="95" width="120" height="155" rx="50" fill="#F59E0B" />
         
         <circle cx="500" cy="70" r="35" fill="#475569" />
         <rect x="460" y="115" width="80" height="135" rx="35" fill="#475569" />
         
         <circle cx="650" cy="50" r="40" />
         <rect x="600" y="100" width="100" height="150" rx="40" />
       </g>
    </g>
  </g>
  
  <rect x="0" y="1040" width="1080" height="40" fill="#F59E0B" />
</svg>
