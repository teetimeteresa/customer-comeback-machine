<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="630" fill="#FAFAF9"/>
  
  <!-- Subtle Background Pattern -->
  <path d="M0 0 L1200 630" stroke="#F59E0B" stroke-width="0.5" opacity="0.1" />
  <path d="M1200 0 L0 630" stroke="#F59E0B" stroke-width="0.5" opacity="0.1" />
  
  <!-- The Heartbeat Line -->
  <path d="M0 400 H300 L320 350 L340 450 L360 400 H500 L550 200 L600 400 H700" stroke="#E7E5E4" stroke-width="4" stroke-linecap="round" />
  
  <!-- Heart Peak -->
  <path d="M600 400 L650 400 L700 300 C700 300 750 250 800 300 C850 250 900 300 900 300 L950 400" stroke="#F59E0B" stroke-width="8" stroke-linecap="round" fill="none" />
  
  <!-- Shop Shape at the end -->
  <g transform="translate(850, 250)">
    <path d="M0 150 V50 L50 0 L100 50 V150" stroke="#1C1917" stroke-width="6" stroke-linejoin="round" fill="white" />
    <rect x="30" y="100" width="40" height="50" fill="#F59E0B" />
    <path d="M-20 50 L50 0 L120 50" stroke="#1C1917" stroke-width="8" />
  </g>
  
  <!-- Text Content -->
  <g transform="translate(100, 180)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="80" fill="#0F172A" letter-spacing="-4">
      <tspan x="0" dy="0">Reclaiming the</tspan>
      <tspan x="0" dy="100" fill="#D97706">Heartbeat.</tspan>
    </text>
    <text x="0" y="240" font-family="'Inter', sans-serif" font-weight="600" font-size="28" fill="#57534E" max-width="600">
      How empathy-first automation brings <br/> the soul back to local business.
    </text>
  </g>
  
  <!-- Logo Badge -->
  <g transform="translate(100, 520)">
     <rect width="120" height="40" rx="20" fill="#0F172A" />
     <text x="60" y="25" font-family="'Inter', sans-serif" font-weight="900" font-size="12" fill="white" text-anchor="middle" letter-spacing="2">WEEK 4 PACK</text>
  </g>
</svg>
