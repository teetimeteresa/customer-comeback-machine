<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#FAFAF9"/>
  
  <g transform="translate(140, 150)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="100" fill="#0F172A" letter-spacing="-4">
      <tspan x="0" dy="0">Reclaim your</tspan>
      <tspan x="0" dy="110" fill="#F59E0B">Sanity.</tspan>
    </text>
    
    <g transform="translate(0, 320)">
      <text font-family="'Inter', sans-serif" font-weight="600" font-size="44" fill="#57534E" leading-relaxed="1.4">
        <tspan x="0" dy="0">Stay connected to your community</tspan>
        <tspan x="0" dy="60">without losing your sleep to</tspan>
        <tspan x="0" dy="60">complicated tech. We're reclaiming</tspan>
        <tspan x="0" dy="60">the heartbeat of local business.</tspan>
      </text>
    </g>
    
    <!-- Sleep/Clock illustration -->
    <g transform="translate(250, 650)">
       <circle cx="150" cy="150" r="150" fill="#FDE68A" />
       <path d="M150 150 L150 70 M150 150 L220 150" stroke="#1C1917" stroke-width="12" stroke-linecap="round" />
       
       <path d="M320 50 C340 50 360 70 360 100 C360 130 340 150 320 150 C335 150 350 135 350 100 C350 65 335 50 320 50Z" fill="#F59E0B" />
       <text x="380" y="80" font-family="'Inter', sans-serif" font-weight="900" font-size="48" fill="#F59E0B">Zzz</text>
    </g>
  </g>
  
  <text x="540" y="1000" font-family="'Inter', sans-serif" font-weight="900" font-size="24" fill="#0F172A" text-anchor="middle" letter-spacing="4">PEACE OF MIND FOR OWNERS</text>
</svg>
