<svg width="1080" height="1080" viewBox="0 0 1080 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1080" fill="#FAFAF9"/>
  
  <g transform="translate(140, 150)">
    <text font-family="'Inter', sans-serif" font-weight="900" font-size="100" fill="#1C1917" letter-spacing="-4">
      <tspan x="0" dy="0">Your Brand's</tspan>
      <tspan x="0" dy="110" fill="#F59E0B">Soul.</tspan>
      <tspan x="0" dy="110">Amplified.</tspan>
    </text>
    
    <g transform="translate(0, 380)">
      <text font-family="'Inter', sans-serif" font-weight="600" font-size="44" fill="#57534E" leading-relaxed="1.4">
        <tspan x="0" dy="0">Our AI doesn't sound like a robot.</tspan>
        <tspan x="0" dy="60">It sounds like YOU—friendly, luxury,</tspan>
        <tspan x="0" dy="60">or funny. Whatever your vibe,</tspan>
        <tspan x="0" dy="60">we've got your back.</tspan>
      </text>
    </g>
    
    <!-- Heart styles illustration -->
    <g transform="translate(0, 650)">
