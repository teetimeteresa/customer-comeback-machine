       <path d="M50 100C50 100 95 75 95 45C95 28.4315 81.5685 15 65 15C56.8237 15 49.4125 18.255 44 23.51C38.5875 18.255 31.1763 15 23 15C6.43147 15 -7 28.4315 -7 45C-7 75 38 100 38 100L50 100Z" fill="#FBBF24" transform="scale(2)" />
       <text x="50" y="240" font-family="'Inter', sans-serif" font-weight="900" font-size="24" fill="#57534E" text-anchor="middle">FRIENDLY</text>
       
       <!-- Luxury Heart -->
       <path d="M250 100C250 100 295 75 295 45C295 28.4315 281.5685 15 265 15C256.8237 15 249.4125 18.255 244 23.51C238.5875 18.255 231.1763 15 223 15C206.4315 15 193 28.4315 193 45C193 75 238 100 238 100L250 100Z" fill="#1C1917" stroke="#FBBF24" stroke-width="4" transform="scale(2) translate(-100, 0)" />
       <text x="300" y="240" font-family="'Inter', sans-serif" font-weight="900" font-size="24" fill="#57534E" text-anchor="middle">LUXURY</text>
       
       <!-- Heartfelt Heart -->
